<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WW2 Dogfight & Evasion</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
  canvas { display:block; }
  #ui { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  #hud { position:fixed; top:16px; left:16px; color:#00ff88; text-shadow:0 0 8px #00ff88; font-size:14px; line-height:1.8; }
  #hud .label { color:#88ffcc; font-size:11px; }
  #hull-bar { display:flex; gap:6px; margin-top:4px; }
  .hull-pip { width:28px; height:28px; border:2px solid #00ff88; border-radius:3px; box-shadow:0 0 6px #00ff88; transition:background 0.2s; }
  .hull-pip.on { background:#00ff88; }
  .hull-pip.off { background:transparent; border-color:#335544; box-shadow:none; }
  #score-box { position:fixed; top:16px; right:16px; color:#ffdd44; text-shadow:0 0 8px #ffdd44; text-align:right; font-size:14px; }
  #overlay { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.82); color:#fff; text-align:center; pointer-events:all; }
  #overlay h1 { font-size:clamp(28px,5vw,52px); color:#ffdd44; text-shadow:0 0 20px #ffaa00; letter-spacing:4px; margin-bottom:8px; }
  #overlay .sub { color:#aaa; font-size:13px; margin-bottom:32px; letter-spacing:2px; }
  #overlay .instructions { color:#ccc; font-size:13px; line-height:2; margin-bottom:36px; max-width:400px; }
  #overlay .instructions span { color:#00ff88; }
  #overlay button { padding:14px 40px; font-size:16px; font-family:'Courier New',monospace; background:transparent; border:2px solid #ffdd44; color:#ffdd44; cursor:pointer; letter-spacing:3px; text-transform:uppercase; transition:all 0.2s; }
  #overlay button:hover { background:#ffdd44; color:#000; box-shadow:0 0 20px #ffdd44; }
  #gameover-score { font-size:22px; color:#00ff88; margin:16px 0 28px; text-shadow:0 0 10px #00ff88; }
  .wave-notice { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#ff4444; font-size:28px; text-shadow:0 0 16px #ff2222; letter-spacing:4px; pointer-events:none; opacity:0; transition:opacity 0.4s; }
  .wave-notice.show { opacity:1; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div class="label">HULL INTEGRITY</div>
    <div id="hull-bar">
      <div class="hull-pip on" id="pip0"></div>
      <div class="hull-pip on" id="pip1"></div>
      <div class="hull-pip on" id="pip2"></div>
    </div>
    <div style="margin-top:10px" class="label">WAVE</div>
    <div id="wave-num" style="color:#ff8844;font-size:18px">1</div>
  </div>
  <div id="score-box">
    <div class="label">DISTANCE</div>
    <div id="dist">0 km</div>
    <div class="label" style="margin-top:6px">KILLS</div>
    <div id="kills">0</div>
  </div>
  <div class="wave-notice" id="wave-notice">WAVE INCOMING!</div>
</div>
<div id="overlay" id="start-overlay">
  <h1>✈ DOGFIGHT</h1>
  <div class="sub">WW2 EVASION MISSION</div>
  <div class="instructions">
    <span>MOUSE</span> — Steer your aircraft<br>
    <span>CLICK</span> — Fire machine guns<br>
    Evade SAM missiles &amp; destroy ground targets<br>
    Survive as long as possible
  </div>
  <button id="start-btn">START MISSION</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const distEl = document.getElementById('dist');
const killsEl = document.getElementById('kills');
const waveEl = document.getElementById('wave-num');
const waveNotice = document.getElementById('wave-notice');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── State ──────────────────────────────────────────────────────────────────
let state = 'start'; // start | play | dead
let mouse = { x: 0, y: 0 };
let shooting = false;

// Game objects
let plane, bullets, missiles, sams, particles, clouds;
let hull, distance, kills, wave, waveTimer, shootTimer;
let scrollY = 0;

function initGame() {
  plane = {
    x: W / 2, y: H / 2,
    vx: 0, vy: -2,
    angle: -Math.PI / 2,  // facing up
    speed: 3.2,
    angularVel: 0,
    trail: []
  };
  bullets = [];
  missiles = [];
  sams = [];
  particles = [];
  clouds = generateClouds(24);
  hull = 3;
  distance = 0;
  kills = 0;
  wave = 1;
  waveTimer = 0;
  shootTimer = 0;
  scrollY = 0;
  spawnWave(wave);
  updateHUD();
}

// ── Clouds ─────────────────────────────────────────────────────────────────
function generateClouds(n) {
  const arr = [];
  for (let i = 0; i < n; i++) arr.push(randomCloud(Math.random() * H));
  return arr;
}
function randomCloud(y) {
  return {
    x: Math.random() * W,
    y: y !== undefined ? y : -100,
    w: 80 + Math.random() * 160,
    h: 30 + Math.random() * 60,
    alpha: 0.08 + Math.random() * 0.14,
    speed: 0.4 + Math.random() * 0.6
  };
}

// ── SAM Sites ──────────────────────────────────────────────────────────────
function spawnWave(w) {
  const count = 2 + Math.floor(w * 1.4);
  for (let i = 0; i < count; i++) {
    const edge = Math.floor(Math.random() * 4);
    let x, y;
    const margin = 60;
    if (edge === 0) { x = Math.random() * W; y = margin; }
    else if (edge === 1) { x = W - margin; y = Math.random() * H; }
    else if (edge === 2) { x = Math.random() * W; y = H - margin; }
    else { x = margin; y = Math.random() * H; }
    sams.push({ x, y, hp: 2, fireTimer: 60 + Math.random() * 120, fireInterval: 180 - w * 8 });
  }
  showWaveNotice();
  waveEl.textContent = w;
}

function showWaveNotice() {
  waveNotice.classList.add('show');
  setTimeout(() => waveNotice.classList.remove('show'), 1800);
}

// ── Proportional Navigation Missile ───────────────────────────────────────
function fireMissile(sx, sy) {
  missiles.push({
    x: sx, y: sy,
    vx: (Math.random() - 0.5) * 2,
    vy: (Math.random() - 0.5) * 2,
    angle: Math.random() * Math.PI * 2,
    speed: 2.2 + wave * 0.12,
    maxTurn: 0.045 + wave * 0.003,
    life: 420,
    trail: [],
    armed: false, armTimer: 30
  });
}

// ── Bullet ─────────────────────────────────────────────────────────────────
function fireBullet() {
  const spd = 10;
  bullets.push({
    x: plane.x, y: plane.y,
    vx: Math.cos(plane.angle) * spd,
    vy: Math.sin(plane.angle) * spd,
    life: 45
  });
}

// ── Particles ──────────────────────────────────────────────────────────────
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const spd = 1 + Math.random() * 4;
    const ang = Math.random() * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      life: 30 + Math.random() * 40,
      maxLife: 0,
      size: 2 + Math.random() * 4,
      color
    });
    particles[particles.length-1].maxLife = particles[particles.length-1].life;
  }
}
function spawnSmoke(x, y) {
  particles.push({
    x, y,
    vx: (Math.random()-0.5)*0.6,
    vy: (Math.random()-0.5)*0.6,
    life: 18 + Math.random()*14,
    maxLife: 28,
    size: 3 + Math.random()*4,
    color: 'rgba(160,160,160,0.5)',
    smoke: true
  });
}

// ── Update ─────────────────────────────────────────────────────────────────
function update() {
  if (state !== 'play') return;

  // Scroll background
  scrollY += plane.speed * 0.5;

  // Plane steering
  const dx = mouse.x - plane.x;
  const dy = mouse.y - plane.y;
  const targetAngle = Math.atan2(dy, dx);
  let diff = targetAngle - plane.angle;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  const turnForce = 0.012;
  plane.angularVel += diff * turnForce;
  plane.angularVel *= 0.78; // damping
  plane.angularVel = Math.max(-0.07, Math.min(0.07, plane.angularVel));
  plane.angle += plane.angularVel;

  plane.vx += Math.cos(plane.angle) * 0.18;
  plane.vy += Math.sin(plane.angle) * 0.18;
  const spd = Math.sqrt(plane.vx*plane.vx + plane.vy*plane.vy);
  if (spd > plane.speed) {
    plane.vx = plane.vx / spd * plane.speed;
    plane.vy = plane.vy / spd * plane.speed;
  }
  plane.x += plane.vx;
  plane.y += plane.vy;

  // Wrap plane
  if (plane.x < -30) plane.x = W + 30;
  if (plane.x > W + 30) plane.x = -30;
  if (plane.y < -30) plane.y = H + 30;
  if (plane.y > H + 30) plane.y = -30;

  // Engine trail
  plane.trail.push({ x: plane.x, y: plane.y, life: 18 });
  if (plane.trail.length > 30) plane.trail.shift();
  plane.trail.forEach(t => t.life--);

  distance += plane.speed * 0.01;

  // Auto-fire when mouse held
  if (shooting) {
    shootTimer--;
    if (shootTimer <= 0) { fireBullet(); shootTimer = 7; }
  }

  // SAMs
  waveTimer++;
  sams.forEach(sam => {
    sam.fireTimer--;
    if (sam.fireTimer <= 0) {
      fireMissile(sam.x, sam.y);
      sam.fireTimer = sam.fireInterval + Math.random() * 60;
    }
    spawnSmoke(sam.x + (Math.random()-0.5)*10, sam.y + (Math.random()-0.5)*10);
  });

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy; b.life--;
    // Hit SAM?
    for (let i = sams.length-1; i >= 0; i--) {
      const s = sams[i];
      if (dist2(b.x, b.y, s.x, s.y) < 20*20) {
        s.hp--;
        spawnExplosion(s.x, s.y, '#ff8800', 10);
        if (s.hp <= 0) {
          spawnExplosion(s.x, s.y, '#ffcc00', 24);
          sams.splice(i, 1);
          kills++;
          killsEl.textContent = kills;
          if (sams.length === 0) {
            wave++;
            waveTimer = 0;
            setTimeout(() => spawnWave(wave), 2000);
          }
        }
        return false;
      }
    }
    return b.life > 0 && b.x > -10 && b.x < W+10 && b.y > -10 && b.y < H+10;
  });

  // Missiles (Proportional Navigation)
  missiles = missiles.filter(m => {
    m.life--;
    m.armTimer = Math.max(0, m.armTimer - 1);
    if (m.armTimer === 0) m.armed = true;

    // PN guidance
    const tdx = plane.x - m.x;
    const tdy = plane.y - m.y;
    const targetAng = Math.atan2(tdy, tdx);
    let mDiff = targetAng - m.angle;
    while (mDiff > Math.PI) mDiff -= Math.PI * 2;
    while (mDiff < -Math.PI) mDiff += Math.PI * 2;
    m.angle += Math.max(-m.maxTurn, Math.min(m.maxTurn, mDiff * 0.15));
    m.vx = Math.cos(m.angle) * m.speed;
    m.vy = Math.sin(m.angle) * m.speed;
    m.x += m.vx; m.y += m.vy;

    m.trail.push({ x: m.x, y: m.y, life: 14 });
    if (m.trail.length > 20) m.trail.shift();
    m.trail.forEach(t => t.life--);
    spawnSmoke(m.x - m.vx * 0.5, m.y - m.vy * 0.5);

    // Hit plane?
    if (m.armed && dist2(m.x, m.y, plane.x, plane.y) < 18*18) {
      spawnExplosion(m.x, m.y, '#ff4400', 20);
      takeDamage();
      return false;
    }
    return m.life > 0 && m.x > -60 && m.x < W+60 && m.y > -60 && m.y < H+60;
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    p.vx *= 0.96; p.vy *= 0.96;
    return p.life > 0;
  });

  // Clouds scroll
  clouds.forEach(c => {
    c.y += c.speed;
    if (c.y > H + 120) { Object.assign(c, randomCloud()); c.y = -120; }
  });

  // Update HUD
  distEl.textContent = Math.floor(distance) + ' km';
}

function dist2(ax, ay, bx, by) {
  return (ax-bx)**2 + (ay-by)**2;
}

function takeDamage() {
  hull--;
  updateHUD();
  // Flash screen
  ctx.fillStyle = 'rgba(255,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);
  if (hull <= 0) gameOver();
}

function updateHUD() {
  for (let i = 0; i < 3; i++) {
    document.getElementById('pip'+i).className = 'hull-pip ' + (i < hull ? 'on' : 'off');
  }
}

// ── Draw ───────────────────────────────────────────────────────────────────
function draw() {
  // Sky gradient
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#0a0a1a');
  grd.addColorStop(1, '#0d1a2e');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Grid lines (scrolling)
  ctx.strokeStyle = 'rgba(0,80,160,0.12)';
  ctx.lineWidth = 1;
  const gs = 80;
  const oy = scrollY % gs;
  for (let y = -gs + oy; y < H + gs; y += gs) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let x = 0; x < W + gs; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  // Clouds
  clouds.forEach(c => {
    ctx.save();
    ctx.globalAlpha = c.alpha;
    ctx.fillStyle = '#c0d8ff';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w/2, c.h/2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Particles (under plane)
  particles.forEach(p => {
    const t = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = p.smoke ? t * 0.5 : t;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.smoke ? 1 + (1-t)*2 : 1), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // SAM sites
  sams.forEach(sam => {
    ctx.save();
    ctx.translate(sam.x, sam.y);
    // Base
    ctx.fillStyle = '#556633';
    ctx.fillRect(-16, -16, 32, 32);
    ctx.strokeStyle = '#88aa44';
    ctx.lineWidth = 2;
    ctx.strokeRect(-16, -16, 32, 32);
    // Launcher barrel pointing at plane
    const ang = Math.atan2(plane.y - sam.y, plane.x - sam.x);
    ctx.strokeStyle = '#aaccaa';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(ang)*22, Math.sin(ang)*22);
    ctx.stroke();
    // HP pips
    for (let i = 0; i < sam.hp; i++) {
      ctx.fillStyle = '#00ff88';
      ctx.fillRect(-8 + i*10, -26, 8, 5);
    }
    ctx.restore();
  });

  // Missile trails
  missiles.forEach(m => {
    m.trail.forEach((t, i) => {
      if (t.life <= 0) return;
      ctx.save();
      ctx.globalAlpha = (t.life / 14) * 0.6;
      ctx.fillStyle = '#ff8800';
      ctx.beginPath();
      ctx.arc(t.x, t.y, 2.5 - i*0.08, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
    // Missile body
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.angle);
    ctx.fillStyle = '#ff3300';
    ctx.beginPath();
    ctx.moveTo(9, 0);
    ctx.lineTo(-5, 4);
    ctx.lineTo(-5, -4);
    ctx.closePath();
    ctx.fill();
    // Glow
    ctx.shadowColor = '#ff6600';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffaa44';
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Bullets
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ffee44';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Plane engine trail
  plane.trail.forEach((t, i) => {
    if (t.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = (t.life / 18) * 0.55;
    ctx.fillStyle = `hsl(${40 + i*2},100%,60%)`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 3.5 - i*0.08, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Player plane
  if (state === 'play') {
    ctx.save();
    ctx.translate(plane.x, plane.y);
    ctx.rotate(plane.angle);
    // Shadow/glow
    ctx.shadowColor = '#44aaff';
    ctx.shadowBlur = 14;
    // Fuselage
    ctx.fillStyle = '#c8d8e8';
    ctx.beginPath();
    ctx.moveTo(18, 0);
    ctx.lineTo(-10, 6);
    ctx.lineTo(-14, 0);
    ctx.lineTo(-10, -6);
    ctx.closePath();
    ctx.fill();
    // Wings
    ctx.fillStyle = '#99aacc';
    ctx.beginPath();
    ctx.moveTo(2, 0);
    ctx.lineTo(-4, 16);
    ctx.lineTo(-12, 14);
    ctx.lineTo(-6, 0);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(2, 0);
    ctx.lineTo(-4, -16);
    ctx.lineTo(-12, -14);
    ctx.lineTo(-6, 0);
    ctx.closePath();
    ctx.fill();
    // Tail
    ctx.fillStyle = '#aabbdd';
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.lineTo(-14, 7);
    ctx.lineTo(-16, 0);
    ctx.lineTo(-14, -7);
    ctx.closePath();
    ctx.fill();
    // Cockpit
    ctx.fillStyle = '#88ccff';
    ctx.beginPath();
    ctx.ellipse(6, 0, 5, 3, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Crosshair
  const cx = mouse.x, cy = mouse.y;
  ctx.save();
  ctx.strokeStyle = 'rgba(0,255,136,0.7)';
  ctx.lineWidth = 1.5;
  const cs = 10;
  ctx.beginPath();
  ctx.moveTo(cx - cs, cy); ctx.lineTo(cx + cs, cy);
  ctx.moveTo(cx, cy - cs); ctx.lineTo(cx, cy + cs);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, cs * 1.6, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

// ── Game Loop ──────────────────────────────────────────────────────────────
let raf;
function loop() {
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

function gameOver() {
  state = 'dead';
  cancelAnimationFrame(raf);
  overlay.innerHTML = `
    <h1>✈ MISSION OVER</h1>
    <div class="sub">YOUR AIRCRAFT WAS DOWNED</div>
    <div id="gameover-score">
      Distance: ${Math.floor(distance)} km &nbsp;|&nbsp; Kills: ${kills} &nbsp;|&nbsp; Wave: ${wave}
    </div>
    <button id="start-btn">FLY AGAIN</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('start-btn').addEventListener('click', startGame);
}

function startGame() {
  overlay.style.display = 'none';
  state = 'play';
  initGame();
  loop();
}

// ── Input ──────────────────────────────────────────────────────────────────
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', e => { if (e.button === 0) { shooting = true; shootTimer = 0; } });
window.addEventListener('mouseup', e => { if (e.button === 0) shooting = false; });
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: false });
window.addEventListener('touchstart', e => {
  shooting = true; shootTimer = 0;
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
});
window.addEventListener('touchend', () => shooting = false);

// Start button
startBtn.addEventListener('click', startGame);

// Initial draw (idle)
mouse.x = W / 2; mouse.y = H / 2;
</script>
</body>
</html>
